name: Publish documents on GitHub pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: CI
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Ensure system CA store exists
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates
          python - <<'PY'
          import ssl
          print(ssl.get_default_verify_paths())
          PY

      - name: Build documentation with Sphinx
        env:
          MQC3_CLIENT_TOKEN: ${{ secrets.TOKEN }}
          MQC3_CLIENT_URL: ${{ secrets.URL }}
        run: |
          echo "event=${{ github.event_name }}"
          echo "len(MQC3_CLIENT_TOKEN)=${#MQC3_CLIENT_TOKEN}"
          echo "len(MQC3_CLIENT_URL)=${#MQC3_CLIENT_URL}"
          echo "MQC3_CLIENT_URL set?=$([ -z "${MQC3_CLIENT_URL}" ] && echo no || echo yes)"
          echo "MQC3_CLIENT_URL set?=$([ -z "${MQC3_CLIENT_URL}" ] && echo no || echo yes)"
          python -m pip install .[sf,dev]
          cd docs
          sphinx-apidoc -e -M -f -o source/reference/ ../src/mqc3/
          make html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/build/html

  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
